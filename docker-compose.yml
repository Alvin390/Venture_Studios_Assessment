services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers 2
             --timeout 120
             --access-logfile -
             --error-logfile -"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - talentflow

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - talentflow

networks:
  talentflow:
    driver: bridge
